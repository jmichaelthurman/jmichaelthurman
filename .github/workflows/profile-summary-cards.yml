name: Generate profile summary cards (personal + work)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity (for commits)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Debug git environment
        run: |
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          pwd
          ls -la
          git status
          git rev-parse --is-inside-work-tree
          git remote -v

      - name: Generate WORK cards (auto-push)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: mthurman-sumer
          BRANCH_NAME: main
          UTC_OFFSET: 0
          AUTO_PUSH: true

      - name: Debug after WORK generation
        if: always()
        run: |
          ls -la
          # the action's default output dir (per your logs)
          ls -la ./profile-summary-card-output || true
          git status

      - name: Generate PERSONAL cards (auto-push)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: jmichaelthurman
          BRANCH_NAME: main
          UTC_OFFSET: 0
          AUTO_PUSH: true

      - name: Debug after PERSONAL generation
        if: always()
        run: |
          ls -la
          ls -la ./profile-summary-card-output || true
          git status
          
